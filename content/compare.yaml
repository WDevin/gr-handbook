# 分值 1–5 为示意性标注，用于雷达/平行坐标展示相对优劣势；非严格论文量化。
axes:
  - id: train_cost
    label: 训练算力/工程复杂度
    max: 5
    description: 5 表示训练与系统工程成本更高
  - id: infer_latency
    label: 线上延迟压力
    max: 5
    description: 5 表示对低延迟 Serving 更不友好（同等团队预算下）
  - id: cold_tail
    label: 冷启动/长尾
    max: 5
    description: 5 表示更依赖语义与生成式泛化
  - id: arch_unify
    label: 架构统一度
    max: 5
    description: 5 表示更接近「一模型多段」或统一骨干
  - id: controllable
    label: 可控/可解释
    max: 5
    description: 规则、审计、约束解码的可操作性
  - id: industrial
    label: 工业公开案例密度
    max: 5
    description: 公开论文/报告中的大规模线上证据丰富程度（主观）

rows:
