name: Update arXiv papers

on:
  schedule:
    # 每日 UTC 06:00（约北京时间 14:00）；可按需调整
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Fetch papers
        run: npm run fetch-papers

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/papers-latest.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: refresh arXiv papers snapshot"
            git push
          fi
